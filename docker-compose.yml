name: ollama-oracle

services:
  chroma:
    image: chromadb/chroma
    container_name: ollama-oracle-chroma
    ports:
      - "8000:8000"
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "echo > /dev/tcp/127.0.0.1/8000"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama:
    build:
      context: .
      dockerfile: docker/ollama.Dockerfile
    container_name: ollama-oracle-ollama
    ports:
      - "11434:11434"
    env_file:
      - .env
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    mem_limit: 5g
    cpus: "2.0"
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "ollama show \"$$OLLAMA_CHAT_MODEL\" >/dev/null 2>&1 && ollama show \"$$OLLAMA_EMBED_MODEL\" >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 30s

  ingest:
    build:
      context: .
      target: ingest
    container_name: ollama-oracle-ingest
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_URL: http://chroma:8000
    depends_on:
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runtime
    container_name: ollama-oracle-app
    ports:
      - "127.0.0.1:3001:3001"
    env_file:
      - .env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_URL: http://chroma:8000
    volumes:
      - rag_logs:/app/rag_logs
    mem_limit: 768m
    cpus: "1.0"
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:3001/health/ready').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 45s
    depends_on:
      ingest:
        condition: service_completed_successfully
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  rag_logs:
