services:
  chroma:
    image: chromadb/chroma
    container_name: chroma
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v2/heartbeat')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  ollama:
    build:
      context: .
      dockerfile: docker/ollama.Dockerfile
    container_name: ollama
    ports:
      - "11434:11434"
    env_file:
      - server/.env
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "sh",
          "-c",
          "ollama show \"$$OLLAMA_CHAT_MODEL\" >/dev/null 2>&1 && ollama show \"$$OLLAMA_EMBED_MODEL\" >/dev/null 2>&1",
        ]
      interval: 15s
      timeout: 10s
      retries: 40
      start_period: 30s

  ingest:
    build:
      context: .
      target: ingest
    env_file:
      - server/.env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_URL: http://chroma:8000
    depends_on:
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runtime
    container_name: nexus-rag-oracle
    ports:
      - "3001:3001"
    env_file:
      - server/.env
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      CHROMA_URL: http://chroma:8000
    volumes:
      - rag_logs:/app/server/rag_logs
    depends_on:
      ingest:
        condition: service_completed_successfully
      chroma:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama_data:
  rag_logs:
